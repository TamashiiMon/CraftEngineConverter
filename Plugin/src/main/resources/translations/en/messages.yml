# Don't change this
version: "${version}"

time:
  format:
    year: "%02d %year% %02d %month% %02d %day% %02d %hour% %02d %minute% %02d %second% %02d %millisecond%"
    month: "%02d %month% %02d %day% %02d %hour% %02d %minute% %02d %second% %02d %millisecond%"
    week: "%02d %week% %02d %day% %02d %hour% %02d %minute% %02d %second% %02d %millisecond%"
    day: "%02d %day% %02d %hour% %02d %minute% %02d %second% %02d %millisecond%"
    hour: "%02d %hour% %02d %minute% %02d %second% %02d %millisecond%"
    minute: "%02d %minute% %02d %second% %02d %millisecond%"
    second: "%02d %second% %02d %millisecond%"
    millisecond: "%02d %millisecond%"
  unit:
    year: "year"
    years: "years"
    month: "month"
    months: "months"
    week: "week"
    weeks: "weeks"
    day: "day"
    days: "days"
    hour: "hour"
    hours: "hours"
    minute: "minute"
    minutes: "minutes"
    second: "second"
    seconds: "seconds"
    millisecond: "millisecond"
    milliseconds: "milliseconds"

command:
  prefix: "&#FFD166C&#FFC863r&#FEBF61a&#FEB65Ef&#FEAD5Bt&#FEA459E&#FD9B56n&#FD9253g&#FD8951i&#FC814En&#FC784Ce&#FC6F49C&#FB6646o&#FB5D44n&#FB5441v&#FB4B3Ee&#FA423Cr&#FA3939t ┃&r "
  no-permission: "§cYou do not have permission to run this command."
  player-only: "§cOnly one player can execute this command."
  no-args: "§cImpossible to find the command with its arguments."
  syntax:
    error: "§cYou must execute the command like this§7: §a%syntax%"
    help: "§f%syntax% §7» §7%description%"
  reload:
    description: "Reloads the plugin configuration and messages."
    success: "§aPlugin configuration and messages reloaded in §c%time%§a."
    failure: "§cAn error occurred while reloading the plugin configuration and messages. Check the console for more details."
  converter:
    description: "Converts items from another plugin to CraftEngine format."
    not-supported: "§cThe plugin §e%plugin%§c is not supported for conversion."
    start:
      single: "§aStarting conversion for §e%plugin%§a..."
      all: "§aStarting conversion for all supported plugins..."
    complete:
      single: "§aConversion completed for §e%plugin%§a! In §c%time%§a."
      all: "§aConversion completed for all plugins! In §c%time%§a."
    dry-run-note: "§eNote§7: This was a dry run, no changes were applied."
    already-running: "§cA conversion is already running. Please wait for it to complete before starting a new one. Or add --force to force start a new conversion (the previous one will be cancelled)."
    force-stopping: "§eForce flag detected. Stopping all ongoing conversions..."
    threads:
      info: "§aUsing §e%threads%§a threads for conversion."
      error-too-many: "§cThe number of threads specified exceeds the number of available processors (%max%). Using the maximum available."
  clear-files-cache:
    description: "Clears the file cache used by the plugin. Add --all to clear all cached files else only stale files will be cleared."
    complete: "§aCleared §e%cleared_files%§a files from the cache in §c%time%§a."
  world-converter:
    description: "Converts world blocks from other plugins to CraftEngine format."
    start: "§aStarting world conversion for §e%chunks%§a chunks..."
    complete: "§aWorld conversion completed! Processed §e%chunks%§a chunks with §e%blocks%§a blocks converted in §c%time%§a."
    already-running: "§cA world conversion is already running. Use --force to cancel the current conversion and start a new one."
    force-stopping: "§eForce flag detected. Stopping ongoing world conversion..."
    clear-cached-chunks:
      description: "Clears the processed chunks cache for world converter."
      complete: "§aCleared §e%chunks%§a processed chunks from cache in §c%time%§a."
    restore:
      description: "Restores converted blocks and entities to their original state."
      start: "§aStarting restoration of §e%count%§a blocks/entities..."
      single:
        success: "§aRestored block/entity at §e%x%§a, §e%y%§a, §e%z%§a to original state."
        not-found: "§cNo conversion history found for block/entity at §e%x%§a, §e%y%§a, §e%z%§a."
        already-reverted: "§eBlock/entity at §e%x%§a, §e%y%§a, §e%z%§a was already reverted."
      all:
        confirm: "§eThis will restore §c%count%§e converted blocks/entities. Use §a--confirm§e to proceed."
        start: "§aStarting restoration of §e%count%§a blocks/entities..."
        complete: "§aRestored §e%restored%§a/§e%total%§a blocks/entities in §c%time%§a."
      database-disabled: "§cDatabase is not enabled. Restoration requires database history."


messages:
  plugin:
    startup: "Enabling plugin ..."
    startup-complete: "Plugin enabled in §c%time%§a."
    shutdown: "Disabling plugin ..."
    shutdown-complete: "Plugin disabled in §c%time%§a."
  auto-converter:
    startup:
      start: "Auto-conversion for supported plugins is starting..."
      complete: "Auto-conversion for supported plugins is complete in §c%time%§a."
      disabled: "Auto-conversion is disabled. Use /cec convert to manually convert supported plugins."

warning:
  template-manager:
    missing-template: "The template §e%template_name%§c is missing! Please report this to the plugin developer."
    error-loading-template: "An error occurred while loading the template §e%template_name%§c! Please report this to the plugin developer."
    invalid-args-number: "Invalid args number for template %template_name%, must be %2. Received %args_length% arguments."
  file:
    delete-failure: "Failed to delete file §e%file% (%path%)§c!"
  folder:
    delete-failure: "Failed to delete folder §e%folder% (%path%)§c!"

error:
  mkdir-failure: "Failed to create directory §e%directory% (%path%)§c!"
  file-operations:
    timeout: "Timeout waiting for file operations to complete"
    force-shutdown: "Forcing shutdown of file operation threads"
  file:
    copy-exception: "An error occurred while copying file §e%file%§c: §e%message%§c"
    load-failure: "Unable to load file '%file%': file not found or invalid YAML format"