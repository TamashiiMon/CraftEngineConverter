# Don't change this
version: "${version}"

time:
  format:
    year: '%02d %year% %02d %month% %02d %day% %02d %hour% %02d %minute% %02d %second%
      %02d %millisecond%'
    month: '%02d %month% %02d %day% %02d %hour% %02d %minute% %02d %second% %02d %millisecond%'
    week: '%02d %week% %02d %day% %02d %hour% %02d %minute% %02d %second% %02d %millisecond%'
    day: '%02d %day% %02d %hour% %02d %minute% %02d %second% %02d %millisecond%'
    hour: '%02d %hour% %02d %minute% %02d %second% %02d %millisecond%'
    minute: '%02d %minute% %02d %second% %02d %millisecond%'
    second: '%02d %second% %02d %millisecond%'
    millisecond: '%02d %millisecond%'
  unit:
    year: an
    years: ans
    month: mois
    months: mois
    week: semaine
    weeks: semaines
    day: jour
    days: jours
    hour: heure
    hours: heures
    minute: minute
    minutes: minutes
    second: seconde
    seconds: secondes
    millisecond: milliseconde
    milliseconds: millisecondes

command:
  prefix: '&#FFD166C&#FFC863r&#FEBF61a&#FEB65Ef&#FEAD5Bt&#FEA459E&#FD9B56n&#FD9253g&#FD8951i&#FC814En&#FC784Ce&#FC6F49C&#FB6646o&#FB5D44n&#FB5441v&#FB4B3Ee&#FA423Cr&#FA3939t ┃&r '
  no-permission: "§cVous n'avez pas la permission d'exécuter cette commande."
  player-only: "§cSeul un joueur peut exécuter cette commande."
  no-args: "§cImpossible de trouver la commande avec ses arguments."
  syntax:
    error: "§cVous devez exécuter la commande ainsi§7 : §a%syntax%"
    help: "§f%syntax% §7» §7%description%"
  reload:
    description: "Recharge la configuration et les messages du plugin."
    success: "§aConfiguration et messages du plugin rechargés en §c%time%§a."
    failure: "§cUne erreur est survenue lors du rechargement de la configuration et des messages du plugin. Vérifiez la console pour plus de détails."
  converter:
    description: "Convertit les items d'un autre plugin au format CraftEngine."
    not-supported: "§cLe plugin §e%plugin%§c n'est pas supporté pour la conversion."
    start:
      single: "§aDébut de la conversion pour §e%plugin%§a..."
      all: "§aDébut de la conversion pour tous les plugins supportés..."
    complete:
      single: "§aConversion terminée pour §e%plugin%§a ! En §c%time%§a."
      all: "§aConversion terminée pour tous les plugins ! En §c%time%§a."
    dry-run-note: "§eNote§7 : Ceci était une simulation, aucun changement n'a été appliqué."
    already-running: "§cUne conversion est déjà en cours. Veuillez attendre qu'elle se termine avant d'en démarrer une nouvelle. Ou ajoutez --force pour forcer le démarrage d'une nouvelle conversion (la précédente sera annulée)."
    force-stopping: "§eOption --force détectée. Arrêt de toutes les conversions en cours..."
    threads:
      info: "§aUtilisation de §e%threads%§a threads pour la conversion."
      error-too-many: "§cLe nombre de threads spécifié dépasse le nombre de processeurs disponibles (%max%). Utilisation du maximum disponible."
  clear-files-cache:
    description: "Efface le cache de fichiers utilisé par le plugin. Ajoutez --all pour effacer tous les fichiers mis en cache, sinon seuls les fichiers obsolètes seront effacés."
    complete: "§aEffacé §e%cleared_files%§a fichiers du cache en §c%time%§a."
  world-converter:
    clear-cached-chunks:
      description: "Efface le cache des chunks traités pour le convertisseur de monde."
      complete: "§aEffacé §e%chunks%§a chunks traités du cache en §c%time%§a."
    restore:
      description: "Restaure les blocs et entités convertis à leur état d'origine."
      start: "§aDébut de la restauration de §e%count%§a blocs/entités..."
      single:
        success: "§aBloc/entité restauré à §e%x%§a, §e%y%§a, §e%z%§a à son état d'origine."
        not-found: "§cAucun historique de conversion trouvé pour le bloc/l'entité à §e%x%§a, §e%y%§a, §e%z%§a."
        already-reverted: "§eBloc/entité à §e%x%§a, §e%y%§a, §e%z%§a déjà restauré."
      all:
        confirm: "§eCeci restaurera §c%count%§e blocs/entités convertis. Utilisez §a--confirm§e pour continuer."
        start: "§aDébut de la restauration de §e%count%§a blocs/entités..."
        complete: "§aRestauré §e%restored%§a/§e%total%§a blocs/entités en §c%time%§a."
        none: "§eAucun bloc ou entité converti à restaurer."
      database-disabled: "§cLa base de données n'est pas activée. La restauration nécessite l'historique en base de données."


messages:
  plugin:
    startup: "Activation du plugin ..."
    startup-complete: "Plugin activé en §c%time%§a."
    shutdown: "Désactivation du plugin ..."
    shutdown-complete: "Plugin désactivé en §c%time%§a."
  auto-converter:
    startup:
      start: "La conversion automatique pour les plugins supportés démarre..."
      complete: "La conversion automatique pour les plugins supportés est terminée en §c%time%§a."
      disabled: "La conversion automatique est désactivée. Utilisez /cec convert pour convertir manuellement les plugins supportés."

