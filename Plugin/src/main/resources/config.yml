    empty-color: DARK_GRAY
    percent-color: YELLOW
    progress-char: █
    empty-char: ░
    bar-width: 50
  images:
    progress-color: GOLD
    empty-color: DARK_GRAY
    percent-color: YELLOW
    progress-char: █
    empty-char: ░
    bar-width: 50
  languages:
    progress-color: BLUE
    empty-color: DARK_GRAY
    percent-color: YELLOW
    progress-char: █
    empty-char: ░
    bar-width: 50
  sounds:
    progress-color: LIGHT_PURPLE
    empty-color: DARK_GRAY
    percent-color: YELLOW
    progress-char: █
    empty-char: ░
    bar-width: 50
  packs:
